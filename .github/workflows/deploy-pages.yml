name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
  # Note: data-only commits from the scrape/rotate jobs cannot trigger a push
  # event here anyway (they're made with GITHUB_TOKEN, which never triggers
  # workflows) — those jobs dispatch this workflow explicitly instead, so the
  # dashboard's ./data/encrypted-history.json stays fresh.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # always deploy the latest data, even when dispatched

      # Site layout: index.html at the root, encrypted data alongside it so the
      # dashboard can fetch it via the relative path ./data/encrypted-history.json
      # (works for both user and project Pages sites, no raw.githubusercontent.com).
      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp web/index.html _site/index.html
          cp data/encrypted-history.json _site/data/encrypted-history.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
